version: '3.8'

services:
  api:
    build:
      context: ./api
      args:
        VERSION: ${VERSION:-1.0.0}
    image: appforge-api:latest
    networks:
      - appforge-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    networks:
      - appforge-net
    environment:
      POSTGRES_USER: ${DB_USER:-appforge_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-appforge_password}
      POSTGRES_DB: ${DB_NAME:-appforge_db}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appforge_user} -d ${DB_NAME:-appforge_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - appforge-net
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - appforge-net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/error_pages:/etc/nginx/error_pages:ro
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus
    networks:
      - appforge-net
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana
    ports:
      - "3001:3000"
    networks:
      - appforge-net
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  cadvisor:
    profiles: ["monitoring"]
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    networks:
      - appforge-net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped

networks:
  appforge-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16

volumes:
  db-data:
  redis-data:
